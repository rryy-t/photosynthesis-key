    <meta charset="UTF-8">

    <title>광합성 가상 실험실</title>

    <style>
        /* [1. DESIGN SYSTEM] 파스텔톤 프리미엄 UI */
        :root {
            --primary: #4caf50;
            --secondary: #dcfd8b;
            --accent: #ff823a;
            --purple: #bc84ee;
            --blue: #2196f3;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Afacad Flux', 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 5% 5%, #dcfd8b55 0%, transparent 25%),
                              radial-gradient(circle at 95% 95%, #bc84ee33 0%, transparent 25%);
            background-attachment: fixed;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .main-app {
            width: 100%; max-width: 800px;
            background: var(--card-bg);
            border-radius: 40px; padding: 45px;
            box-shadow: 0 20px 60px rgba(0, 51, 102, 0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-family: 'Comfortaa', cursive; color: var(--text-color); font-size: 2.2rem; margin: 0; }
        
        .step-pill {
            display: inline-block; background-color: var(--accent); color: white;
            padding: 8px 25px; border-radius: 50px; font-weight: 700;
            font-size: 0.9rem; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(255, 130, 58, 0.3);
        }

        section { margin-bottom: 60px; }
        h2 { font-size: 1.3rem; color: #333; display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        h2 i { color: var(--primary); font-size: 1.5rem; }

        .card-box { background: #f8fafc; border-radius: 30px; padding: 30px; border: 1px solid #e2e8f0; line-height: 1.6; }

        /* 2단계: 주제 선택 레이아웃 */
        .radio-container { display: flex; flex-direction: column; gap: 12px; }
        .radio-label {
            background: #fff; padding: 18px 25px; border-radius: 25px; border: 2px solid #e2e8f0;
            cursor: pointer; display: flex; align-items: center; gap: 15px;
            transition: all 0.3s; font-weight: 600; font-size: 1.05rem;
        }
        .radio-label.active { border-color: var(--primary); background-color: #f0fff4; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(76, 175, 80, 0.15); }
        input[type="radio"] { width: 20px; height: 20px; accent-color: var(--primary); margin: 0; }

        /* 3단계: 변인 확인 그리드 */
        .v-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .v-card { background: white; padding: 22px 10px; border-radius: 25px; text-align: center; border: 1px solid #e2e8f0; }
        .v-card strong { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #a0aec0; letter-spacing: 1px; }
        .v-card span { color: var(--text-color); font-weight: 700; font-size: 0.95rem; line-height: 1.3; }

        /* 4단계: 실험 조작 */
        .slider-row { margin-bottom: 25px; }
        .slider-row label { display: block; margin-bottom: 12px; font-weight: 600; font-size: 1rem; }
        .slider-row label b { color: var(--primary); font-size: 1.2rem; }
        input[type="range"] { width: 100%; height: 12px; background: #e2e8f0; border-radius: 10px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 28px; height: 28px; background: var(--primary); border-radius: 50%; border: 4px solid white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }

        #result-preview { background: #2d3436; color: white; padding: 30px; border-radius: 30px; text-align: center; font-weight: 700; font-size: 1.5rem; margin: 15px 0; }
        #result-preview span { color: var(--secondary); font-size: 2.2rem; }

        .btn {
            border: none; border-radius: 25px; padding: 20px; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; color: white;
        }
        .btn-record { background-color: var(--primary); }
        .btn-graph { background-color: var(--purple); margin-top: 15px; width: 100%; }
        .btn-grade { background-color: var(--blue); margin-top: 25px; width: 100%; }
        .btn-retry { background-color: #636e72; margin-top: 15px; width: 100%; }
        .btn:hover { transform: translateY(-4px); filter: brightness(1.1); }
        .btn:active { transform: translateY(0); }

        .warning-text { background: #fff5f5; color: #e53e3e; padding: 15px; border-radius: 20px; font-weight: 700; display: none; margin-bottom: 10px; border: 1.5px solid #fed7d7; }

        /* 결과 시각화 */
        .table-area { overflow-x: auto; margin-top: 20px; border-radius: 25px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; padding: 18px; font-size: 0.95rem; color: #4a5568; }
        td { padding: 18px; border-top: 1px solid #f1f5f9; text-align: center; font-weight: 600; }

        .quiz-zone { background: #fafbfc; border: 3px dashed #cbd5e1; padding: 40px; border-radius: 35px; }
        .quiz-sentence { line-height: 2.8; font-size: 1.15rem; font-weight: 500; }
